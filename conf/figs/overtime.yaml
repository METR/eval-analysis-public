wrangle_logistic:
  headline: &wrangle_headline
    runs_file: all_runs
    weighting: invsqrt_task_weight
    categories: ftr
    regularization: 0.1
    exclude: []
    success_percents: [50, 80]

  ga_rebench:
    <<: *wrangle_headline
    exclude: ["SWAA"]
    success_percents: [50]

  swe_bench:
    <<: *wrangle_headline
    runs_file: swe_bench_runs
    success_percents: [50]

plot_logistic_regression:
  headline: &plot_headline
    <<: *wrangle_headline
    trendlines:
      - fit_type: exponential
        caption: null
        after_date: "2019-01-01"
        color: blue
        line_start_date: "2018-12-01"
        line_end_date: "2027-01-01"
        display_r_squared: true
        styling: null
        data_file: null
        skip_annotation: false
    include_task_distribution: none
    x_lim_start: "2018-09-03"
    x_lim_end: "2027-01-01"
    lower_y_lim: 0.0083333 # 0.5 seconds
    upper_y_lim: 360
    exclude_agents:
      - GPT-4 0125
    title: "Length of tasks AI agents have been able to complete autonomously"
    subtitle: "for 169 software engineering, cybersecurity, general reasoning, and ML tasks"

  p80:
    <<: *plot_headline
    logistic_file: headline
    subtitle: 80% success rate
    success_percent: 80
    trendlines:
      - fit_type: exponential
        caption: null
        after_date: "2020-01-01"
        color: blue
        line_start_date: "2019-09-01"
        line_end_date: "2027-01-01"
        display_r_squared: true
        styling: null
        data_file: null
        skip_annotation: false

  single_line_2023_ga_rebench:
    runs_file: all_runs
    logistic_file: ga_rebench
    trendlines:
      - fit_type: exponential
        skip_annotation: false
        caption: null
        after_date: "2023-01-01"
        color: blue
        line_start_date: "2023-01-01"
        line_end_date: "2025-04-01"
        display_r_squared: true
        data_file: null
        styling:
          linewidth: 2
          alpha: 0.5
          linestyle: dashed
    include_task_distribution: none
    weighting: invsqrt_task_weight
    x_lim_start: "2022-12-01"
    x_lim_end: "2025-04-01"
    lower_y_lim: 1
    upper_y_lim: 90
    exclude:
      - SWAA
    exclude_agents:
      - GPT-4 0125

  double_line_all_data_retrodict_excluding_swaa:
    runs_file: all_runs
    logistic_file: headline
    weighting: invsqrt_task_weight
    include_task_distribution: none
    title: "50% Time Horizon Retrodicted from 2023-2024 Data"

    trendlines:
      - fit_type: exponential
        skip_annotation: false
        caption: Actual Fit
        after_date: "2018-01-01"
        color: black
        line_start_date: "2018-12-01"
        line_end_date: "2025-07-01"
        display_r_squared: true
        data_file: null
        styling:
          linewidth: 2
          alpha: 0.6
          linestyle: solid
      - fit_type: exponential
        skip_annotation: false
        caption: |-
          Retrodiction Fit
          (Fit on 2023 onwards GA + RE data ONLY)
        after_date: "2023-01-01"
        color: blue
        line_start_date: "2018-12-01"
        line_end_date: "2025-07-01"
        display_r_squared: false
        data_file: data/wrangled/logistic_fits/ga_rebench.csv
        styling:
          linewidth: 2
          alpha: 0.6
          linestyle: solid
    exclude:
      - "SWAA"
    exclude_agents:
      - GPT-4 0125
    lower_y_lim: 0.0083333 # 0.5 seconds
    upper_y_lim: 240
    x_lim_start: "2018-09-03"
    x_lim_end: "2025-11-06"


  swe_bench:
    runs_file: swe_bench_runs
    logistic_file: swe_bench
    weighting: invsqrt_task_weight
    include_task_distribution: none
    title: "Time Horizon for SWE-Bench Verified Tasks"
    trendlines:
      - fit_type: exponential
        skip_annotation: false
        caption: null
        after_date: "2023-01-01"
        color: blue
        line_start_date: "2023-01-01"
        line_end_date: "2025-03-14"
        display_r_squared: true
        data_file: null
        styling: null
    x_lim_start: "2023-01-01"
    x_lim_end: "2025-03-14"
    lower_y_lim: 0.05
    upper_y_lim: 240
    exclude_agents: []
    exclude: []

plot_individual_histograms:
  no_swaa:
    annotate_p50: true
    logistic_file: "data/wrangled/logistic_fits/ga_rebench.csv"
    weighting: "invsqrt_task_weight"
    n_bins: 10
    n_subplot_cols: 3
    horizontal_lines:
      - p_success: 0.5
        styling:
          color: "#b30c00"
          linestyle: "dashed"
          linewidth: 2.5
          alpha: 1
    x_lim_start: "2022-12-01"
    x_lim_end: "2025-04-01"
    lower_y_lim: 0
    upper_y_lim: 1
    exclude:
      - "SWAA"
    include_agents:
      - Claude 3.5 Sonnet (New)
      - Claude 3.5 Sonnet (Old)
      - Claude 3 Opus
      - o1
      - o1-preview
      - GPT-4o
      - GPT-4 Turbo
      - GPT-4 1106
      - GPT-4 0314
      # - gpt-3.5-turbo-instruct
      # - davinci-002 (GPT-3)
      # - GPT-2

  default:
    annotate_p50: true
    logistic_file: "data/wrangled/logistic_fits/headline.csv"
    weighting: "invsqrt_task_weight"
    title: "Length of tasks AI agents have been able to complete autonomously"
    n_bins: 10
    n_subplot_cols: 3
    horizontal_lines:
      - p_success: 0.5
        styling:
          color: "#b30c00"
          linestyle: "dashed"
          linewidth: 2.5
          alpha: 1
    x_lim_start: "2022-12-01"
    x_lim_end: "2025-04-01"
    lower_y_lim: 0
    upper_y_lim: 1
    exclude: []
    include_agents:
      - Claude 3.5 Sonnet (New)
      - Claude 3.5 Sonnet (Old)
      - Claude 3 Opus
      - o1
      - o1-preview
      - GPT-4o
      - GPT-4 Turbo
      - GPT-4 1106
      - GPT-4 0314
      - gpt-3.5-turbo-instruct
      - davinci-002 (GPT-3)
      - GPT-2


plot_multiverse_boxplot:
  weightings: ["equal_task_weight", "invsqrt_task_weight"]
  regularizations: [0.2, 0.1, 0.05, 0.02, 0.01]
  categories: "ftr"
  include_agents:
    - Claude 3.5 Sonnet (New)
    - Claude 3.5 Sonnet (Old)
    - Claude 3 Opus
    - o1
    - o1-preview
    - GPT-4o
    - GPT-4 Turbo
    - GPT-4 1106
    - GPT-4 0314
    - gpt-3.5-turbo-instruct
    - davinci-002 (GPT-3)
    - GPT-2
