stages:
  generate_latex_tables:
    frozen: true
    cmd:
      - >-
        [ -d /tmp/tasks ]
        || git clone ${tasks_repo.url} /tmp/tasks
        && cd /tmp/tasks
        && git fetch
        && git checkout ${tasks_repo.rev}
      - >-
        python -m src.generate_latex_tables
        --task-repo-dir=/tmp/tasks
        --difficulty-file=../../data/external/task_difficulty.yaml
        --blueprint-file=../../data/external/blueprints/benchmark.yaml
        --labels-file=../../data/external/family_labels.yaml
        --output-dir=tables
    deps:
      - src/generate_latex_tables.py
      - ../../data/external/task_difficulty.yaml
      - ../../data/external/blueprints/benchmark.yaml
      - ../../data/external/family_labels.yaml
    outs:
      - tables/family_summary_table.tex
      - tables/contamination_distribution_table.tex
      - tables/expertise_distribution_table.tex
      - tables/category_distribution_table.tex
      - tables/qualitative_properties_table.tex
